<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
    <title>OOH Totem — Audio Sync</title>
    <link rel="stylesheet" href="/static/css/totem.css">
</head>
<body>
    <div class="totem-container">
        <!-- Video: direct src, browser handles buffering -->
        <video id="video" autoplay loop muted playsinline preload="auto">
            <source src="/media/99_video.mp4" type="video/mp4">
        </video>

        <!-- Status -->
        <!-- <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Conectando...</span>
        </div> -->

        <!-- QR Code -->
        <div class="qr-overlay">
            <div class="qr-card">
                <div class="scan-ring"></div>
                <div class="qr-wrapper" id="qrWrapper"></div>
                <div class="qr-label">
                    <span class="icon">🎧</span> Escaneie para ouvir o áudio
                </div>
            </div>
        </div>
    </div>

    <!-- QR Code library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- Application script -->
    <script src="/static/js/totem.js"></script>
</body>
</html>
