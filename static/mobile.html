<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎧 Audio Sync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>

    <!-- ── OVERLAY: toque para iniciar (autoplay fallback) ── -->
    <div class="tap-overlay" id="tapOverlay">
        <div class="tap-icon" id="tapIcon">🎧</div>
        <div class="tap-text" id="tapText">Toque para ouvir</div>
        <div class="tap-sub" id="tapSub">O áudio será sincronizado automaticamente</div>
        <div class="tap-loading hidden" id="tapLoading">⏳ Conectando ao totem...</div>
    </div>

    <!-- ── MAIN: mostrado após o áudio começar ──────────── -->
    <div class="mobile-container hidden" id="mainUI">
        <div class="header">
            <h1>🎧 Reproduzindo</h1>
        </div>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="status-badge playing" id="statusBadge">
            <span id="statusIcon">🎵</span>
            <span id="statusLabel">Sincronizado</span>
        </div>
    </div>

    <!-- HTML5 audio element — iOS needs this for audio session activation -->
    <audio id="audioPlayer" preload="auto" playsinline></audio>

    <script src="/static/js/mobile.js"></script>
</body>
</html>
