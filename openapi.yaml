openapi: 3.0.3
info:
  title: OOH Audio Sync API
  description: Backend APIs for the DreamBricks Audio-Video Sync Totem system.
  version: "1.0.0"
servers:
  - url: http://localhost:8001
    description: Local Node.js Server
paths:
  /health:
    get:
      summary: System Health Check
      description: Returns the current status and metrics of the synchronization server.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  server_time:
                    type: number
                    example: 1708892345.123
                  sessions:
                    type: integer
                    example: 2
                  mobile_clients:
                    type: integer
                    example: 10
                  drift_clients:
                    type: integer
                    example: 10
                  uptime_s:
                    type: integer
                    example: 3600

  /api/videos:
    get:
      summary: List Available Videos
      description: Retrieves all available .mp4 and .webm video files present in the `assets/` directory.
      responses:
        '200':
          description: A list of video filenames
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["ivete_video.mp4", "promo.mp4"]

  /api/totems:
    get:
      summary: List Registered Totems
      description: Returns a list of all totems and their current configurations (online status, mobile count, and assigned video).
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: "Totem_A"
                    is_online:
                      type: boolean
                      example: true
                    mobile_count:
                      type: integer
                      example: 3
                    video:
                      type: string
                      nullable: true
                      example: "ivete_video.mp4"

  /api/totem/{id}/video:
    post:
      summary: Assign Video to Totem
      description: Sets a specific video to be played by a totem. Updates the configuration file (`totems.json`) and pushes a WebSocket message to the totem if it is online.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The ID of the totem (e.g., "Totem_A")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - video
              properties:
                video:
                  type: string
                  description: The filename of the video from the `assets/` folder
                  example: "ivete_video.mp4"
      responses:
        '200':
          description: Video assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  id:
                    type: string
                    example: "Totem_A"
                  video:
                    type: string
                    example: "ivete_video.mp4"
        '400':
          description: Bad request (missing video)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No video specified"

  /media/{filename}:
    get:
      summary: Stream Media File
      description: Streams a video or audio file with support for HTTP Range requests.
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: The filename of the media to stream
      responses:
        '200':
          description: Full file content
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content (Range response)
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid filename path
        '404':
          description: File not found
        '416':
          description: Range not satisfiable
